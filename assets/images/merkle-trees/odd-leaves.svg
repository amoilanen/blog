<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <linearGradient id="rootG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="intG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="leafG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dupG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="dataG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Handling Odd Number of Leaves (3 transactions)</text>

  <!-- Edges drawn FIRST so nodes paint on top -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="360" y1="92" x2="200" y2="170"/>
    <line x1="360" y1="92" x2="520" y2="170"/>
    <line x1="200" y1="216" x2="120" y2="275"/>
    <line x1="200" y1="216" x2="280" y2="275"/>
    <line x1="520" y1="216" x2="440" y2="275"/>
    <line x1="520" y1="216" x2="600" y2="275" stroke="#ea580c" stroke-dasharray="6,3"/>
    <line x1="120" y1="315" x2="120" y2="350" stroke-dasharray="4,3"/>
    <line x1="280" y1="315" x2="280" y2="350" stroke-dasharray="4,3"/>
    <line x1="440" y1="315" x2="440" y2="350" stroke-dasharray="4,3"/>
    <line x1="600" y1="315" x2="600" y2="350" stroke="#ea580c" stroke-dasharray="4,3"/>
  </g>

  <!-- Root -->
  <g filter="url(#sh2)">
    <rect x="290" y="48" width="140" height="44" rx="8" fill="url(#rootG2)"/>
    <text x="360" y="75" text-anchor="middle" fill="white" font-weight="600">Root Hash</text>
  </g>

  <!-- Internal nodes -->
  <g filter="url(#sh2)">
    <rect x="130" y="170" width="140" height="46" rx="8" fill="url(#intG2)"/>
    <text x="200" y="190" text-anchor="middle" fill="white" font-weight="600">H01</text>
    <text x="200" y="207" text-anchor="middle" fill="#ddd6fe" font-size="10">H(0x01 ‖ H0 ‖ H1)</text>
  </g>
  <g filter="url(#sh2)">
    <rect x="450" y="170" width="140" height="46" rx="8" fill="url(#intG2)"/>
    <text x="520" y="190" text-anchor="middle" fill="white" font-weight="600">H23</text>
    <text x="520" y="207" text-anchor="middle" fill="#ddd6fe" font-size="10">H(0x01 ‖ H2 ‖ H2)</text>
  </g>

  <!-- Leaf nodes -->
  <g filter="url(#sh2)">
    <rect x="70" y="275" width="100" height="40" rx="8" fill="url(#leafG2)"/>
    <text x="120" y="300" text-anchor="middle" fill="white" font-weight="600">H0</text>
  </g>
  <g filter="url(#sh2)">
    <rect x="230" y="275" width="100" height="40" rx="8" fill="url(#leafG2)"/>
    <text x="280" y="300" text-anchor="middle" fill="white" font-weight="600">H1</text>
  </g>
  <g filter="url(#sh2)">
    <rect x="390" y="275" width="100" height="40" rx="8" fill="url(#leafG2)"/>
    <text x="440" y="300" text-anchor="middle" fill="white" font-weight="600">H2</text>
  </g>
  <!-- Duplicated leaf -->
  <g filter="url(#sh2)">
    <rect x="550" y="275" width="100" height="40" rx="8" fill="url(#dupG)" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="600" y="300" text-anchor="middle" fill="white" font-weight="600">H2'</text>
  </g>

  <!-- Data blocks -->
  <g filter="url(#sh2)">
    <rect x="70" y="355" width="100" height="30" rx="6" fill="url(#dataG2)"/>
    <text x="120" y="375" text-anchor="middle" fill="white" font-weight="600">tx0</text>
  </g>
  <g filter="url(#sh2)">
    <rect x="230" y="355" width="100" height="30" rx="6" fill="url(#dataG2)"/>
    <text x="280" y="375" text-anchor="middle" fill="white" font-weight="600">tx1</text>
  </g>
  <g filter="url(#sh2)">
    <rect x="390" y="355" width="100" height="30" rx="6" fill="url(#dataG2)"/>
    <text x="440" y="375" text-anchor="middle" fill="white" font-weight="600">tx2</text>
  </g>
  <!-- Duplicated data -->
  <g filter="url(#sh2)">
    <rect x="550" y="355" width="100" height="30" rx="6" fill="url(#dupG)" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="600" y="375" text-anchor="middle" fill="white" font-weight="600">tx2</text>
  </g>

  <!-- Duplicate annotation with background -->
  <rect x="656" y="278" width="56" height="20" rx="4" fill="white" fill-opacity="0.9"/>
  <text x="660" y="293" fill="#ea580c" font-size="12" font-weight="500">← dup</text>
  <rect x="656" y="358" width="56" height="20" rx="4" fill="white" fill-opacity="0.9"/>
  <text x="660" y="373" fill="#ea580c" font-size="12" font-weight="500">← dup</text>

  <!-- Legend -->
  <g transform="translate(80, 410)">
    <rect x="-10" y="-10" width="570" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="4" y="0" width="14" height="14" rx="3" fill="url(#leafG2)"/>
    <text x="24" y="12" fill="#475569" font-size="11">Original leaf hashes</text>
    <rect x="200" y="0" width="14" height="14" rx="3" fill="url(#dupG)" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="220" y="12" fill="#475569" font-size="11">Duplicated last leaf (H2' = H2)</text>
  </g>
</svg>