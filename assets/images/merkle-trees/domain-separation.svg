<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <linearGradient id="leafDom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="intDom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="dangerDom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="sh3" x="-2%" y="-4%" width="104%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Domain Separation: Leaf vs Internal Node Hashing</text>

  <!-- Divider line -->
  <line x1="360" y1="48" x2="360" y2="265" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Left side: Without domain separation -->
  <g transform="translate(20, 55)">
    <text x="160" y="0" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">✗ Without Domain Separation</text>

    <g filter="url(#sh3)">
      <rect x="20" y="18" width="280" height="48" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="32" y="38" fill="#64748b" font-size="12">Leaf hash:</text>
      <text x="32" y="56" fill="#1e293b" font-size="12" font-family="monospace">SHA-256(data)</text>
    </g>

    <g filter="url(#sh3)">
      <rect x="20" y="78" width="280" height="48" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="32" y="98" fill="#64748b" font-size="12">Internal hash:</text>
      <text x="32" y="116" fill="#1e293b" font-size="12" font-family="monospace">SHA-256(left ‖ right)</text>
    </g>

    <g filter="url(#sh3)">
      <rect x="20" y="145" width="280" height="70" rx="8" fill="url(#dangerDom)"/>
      <text x="160" y="170" text-anchor="middle" fill="white" font-weight="600" font-size="12">⚠ Same hash domain!</text>
      <text x="160" y="188" text-anchor="middle" fill="#fecaca" font-size="11">Attacker can craft leaf data that</text>
      <text x="160" y="204" text-anchor="middle" fill="#fecaca" font-size="11">collides with an internal node hash</text>
    </g>
  </g>

  <!-- Right side: With domain separation -->
  <g transform="translate(380, 55)">
    <text x="155" y="0" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">✓ With Domain Separation (RFC 6962)</text>

    <g filter="url(#sh3)">
      <rect x="10" y="18" width="300" height="48" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <rect x="20" y="26" width="38" height="32" rx="4" fill="url(#leafDom)"/>
      <text x="39" y="47" text-anchor="middle" fill="white" font-weight="700" font-size="11">0x00</text>
      <text x="70" y="38" fill="#64748b" font-size="12">Leaf hash:</text>
      <text x="70" y="56" fill="#1e293b" font-size="12" font-family="monospace">SHA-256(0x00 ‖ data)</text>
    </g>

    <g filter="url(#sh3)">
      <rect x="10" y="78" width="300" height="48" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
      <rect x="20" y="86" width="38" height="32" rx="4" fill="url(#intDom)"/>
      <text x="39" y="107" text-anchor="middle" fill="white" font-weight="700" font-size="11">0x01</text>
      <text x="70" y="98" fill="#64748b" font-size="12">Internal hash:</text>
      <text x="70" y="116" fill="#1e293b" font-size="12" font-family="monospace">SHA-256(0x01 ‖ left ‖ right)</text>
    </g>

    <g filter="url(#sh3)">
      <rect x="10" y="145" width="300" height="70" rx="8" fill="#059669"/>
      <text x="160" y="170" text-anchor="middle" fill="white" font-weight="600" font-size="12">✓ Separate hash domains</text>
      <text x="160" y="188" text-anchor="middle" fill="#d1fae5" font-size="11">A leaf hash can never equal an</text>
      <text x="160" y="204" text-anchor="middle" fill="#d1fae5" font-size="11">internal node hash — collision impossible</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="600" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="300" y="20" text-anchor="middle" fill="#475569" font-size="12">A single-byte prefix is all it takes to prevent second-preimage attacks on the tree structure.</text>
  </g>
</svg>